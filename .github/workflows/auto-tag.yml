name: Create release tag

# Manual helper that creates `vX.Y.Z` from the current `main` workspace
# version after the release source is frozen. This is intentionally not
# triggered by every version bump on `main`: release prep can land before the
# same-version issue/PR queue is truly empty, and an eager tag leaves later
# same-version work outside the public release anchor.
#
# IMPORTANT: tag pushes signed by the default `GITHUB_TOKEN` do NOT trigger
# downstream `on: push: tags` workflows (GitHub Actions safety rule). For
# this auto-tag flow to actually fire `release.yml`, store a PAT (or
# fine-grained token) with `contents: write` on this repo as the
# `RELEASE_TAG_PAT` secret. Without it, the tag is created but `release.yml`
# does NOT run automatically; run `release.yml` manually for the version.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-tag-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          # Prefer PAT so the resulting tag push triggers release.yml.
          # Falls back to GITHUB_TOKEN, which will tag but NOT trigger.
          token: ${{ secrets.RELEASE_TAG_PAT || github.token }}

      - name: Require main dispatch
        id: source
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Create release tags from main only; rerun this workflow with ref 'main'." >&2
            exit 1
          fi
          intended_sha="$(git rev-parse 'HEAD^{commit}')"
          event_sha="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          if [ "${intended_sha}" != "${event_sha}" ]; then
            echo "::error::Checkout ${intended_sha} does not match dispatch SHA ${event_sha}." >&2
            exit 1
          fi
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          live_main="$(git rev-parse 'refs/remotes/origin/main^{commit}')"
          if [ "${intended_sha}" != "${live_main}" ]; then
            echo "::error::Dispatch SHA ${intended_sha} is stale; live origin/main is ${live_main}. Rerun from the current main ref." >&2
            exit 1
          fi
          echo "sha=${intended_sha}" >> "${GITHUB_OUTPUT}"

      - name: Read workspace version
        id: ver
        run: |
          v="$(grep -E '^version = "' Cargo.toml | head -n1 | sed -E 's/^version = "([^"]+)".*/\1/')"
          if [ -z "$v" ]; then
            echo "::error::Could not parse workspace version from Cargo.toml" >&2
            exit 1
          fi
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Workspace version '$v' is not valid semver (expected X.Y.Z)" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $v"

      - name: Check whether tag already exists
        id: check
        env:
          EXPECTED_SHA: ${{ steps.source.outputs.sha }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk 'NR == 1 {print $1}')"
          if [ -z "${remote_tag_sha}" ]; then
            remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk 'NR == 1 {print $1}')"
          fi
          if [ -n "${remote_tag_sha}" ]; then
            if [ "${remote_tag_sha}" != "${EXPECTED_SHA}" ]; then
              echo "::error::Tag ${TAG} already exists at ${remote_tag_sha}, expected ${EXPECTED_SHA}." >&2
              exit 1
            fi
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists at the intended SHA; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist; will create."
          fi

      - name: Verify version consistency
        if: steps.check.outputs.exists == 'false'
        run: |
          ./scripts/release/check-versions.sh --require-dated-release || {
            echo "::error::Version consistency check failed. Aborting tag creation." >&2
            exit 1
          }

      - name: Create and push tag
        id: create
        if: steps.check.outputs.exists == 'false'
        env:
          EXPECTED_SHA: ${{ steps.source.outputs.sha }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          live_main="$(git rev-parse 'refs/remotes/origin/main^{commit}')"
          if [ "${live_main}" != "${EXPECTED_SHA}" ]; then
            echo "::error::origin/main advanced to ${live_main}; refusing to tag stale ${EXPECTED_SHA}." >&2
            exit 1
          fi
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk 'NR == 1 {print $1}')"
          if [ -z "${remote_tag_sha}" ]; then
            remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk 'NR == 1 {print $1}')"
          fi
          if [ -n "${remote_tag_sha}" ]; then
            if [ "${remote_tag_sha}" != "${EXPECTED_SHA}" ]; then
              echo "::error::Tag ${TAG} appeared at ${remote_tag_sha}, expected ${EXPECTED_SHA}." >&2
              exit 1
            fi
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists at the intended SHA after refresh; nothing to do."
            exit 0
          fi
          git tag -f "${TAG}" "${EXPECTED_SHA}"
          max_retries=3
          retry_count=0
          while [ "${retry_count}" -lt "${max_retries}" ]; do
            if git push origin "${TAG}"; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              echo "Pushed ${TAG}. release.yml should now run (requires RELEASE_TAG_PAT for trigger)."
              exit 0
            fi
            remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk 'NR == 1 {print $1}')"
            if [ -z "${remote_tag_sha}" ]; then
              remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk 'NR == 1 {print $1}')"
            fi
            if [ -n "${remote_tag_sha}" ]; then
              if [ "${remote_tag_sha}" != "${EXPECTED_SHA}" ]; then
                echo "::error::Tag ${TAG} appeared during push at ${remote_tag_sha}, expected ${EXPECTED_SHA}." >&2
                exit 1
              fi
              echo "pushed=false" >> "$GITHUB_OUTPUT"
              echo "Tag ${TAG} appeared at the intended SHA during push; treating as already handled."
              exit 0
            fi
            retry_count=$((retry_count + 1))
            if [ "${retry_count}" -lt "${max_retries}" ]; then
              echo "Push attempt ${retry_count} failed; retrying in 10s..."
              sleep 10
            fi
          done

          echo "::error::Failed to push tag ${TAG} after ${max_retries} attempts." >&2
          exit 1

      - name: Warn if PAT missing
        if: steps.create.outputs.pushed == 'true'
        env:
          HAS_PAT: ${{ secrets.RELEASE_TAG_PAT != '' }}
        run: |
          if [ "${HAS_PAT}" != "true" ]; then
            echo "::warning::RELEASE_TAG_PAT secret is not set. The tag was pushed using GITHUB_TOKEN, which does NOT trigger release.yml. First confirm no tag-triggered Release run is queued or active, then run 'gh workflow run release.yml --ref ${{ steps.ver.outputs.tag }} -f version=${{ steps.ver.outputs.version }}'."
          fi
